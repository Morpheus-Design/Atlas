# Atlas MK1 based on Ender-3 V2 ABL
# printer_size: 220x220x250
# version: 1.2
# This file contains pin mappings for the stock 2020 Creality Ender-3 V2+CRtouch 
# To use this config, during "make menuconfig" select the
# STM32F103 with a "28KiB bootloader" and serial (on USART1 PA10/PA9)
# communication.
# If you prefer a direct serial connection, in "make menuconfig"
# select "Enable extra low-level configuration options" and select
# serial (on USART3 PB11/PB10), which is broken out on the 10 pin IDC
# cable used for the LCD module as follows:
# 3: Tx, 4: Rx, 9: GND, 10: VCC
# Flash this firmware by copying "out/klipper.bin" to a SD card and
# turning on the printer with the card inserted. The firmware
# filename must end in ".bin" and must not match the last filename
# that was flashed.
# See docs/Config_Reference.md for a description of parameters.
#Backup for GitHub: ~/atlas-backup.sh

### fluidd set ###
[include cx_printer.cfg]

[include gab-3d-utilities.cfg]

[include KAMP_Settings.cfg]

[include sfs2.cfg]

[include timelapse.cfg]

[include cx_gmcro.cfg]

[pause_resume]

[respond]

[display_status]

[virtual_pins]

[force_move]
enable_force_move: true

[safe_z_home]
home_xy_position: 150, 120
#   A X, Y coordinate (e.g. 100, 100) where the Z homing should be
#   performed. This parameter must be provided.
speed: 100.0
#   Speed at which the toolhead is moved to the safe Z home
#   coordinate. The default is 50 mm/s
z_hop: 10
#   Distance (in mm) to lift the Z axis prior to homing. This is
#   applied to any homing command, even if it doesn't home the Z axis.
#   If the Z axis is already homed and the current Z position is less
#   than z_hop, then this will lift the head to a height of z_hop. If
#   the Z axis is not already homed the head is lifted by z_hop.
#   The default is to not implement Z hop.
z_hop_speed: 10.0
#   Speed (in mm/s) at which the Z axis is lifted prior to homing. The
#   default is 15 mm/s.
move_to_previous: False
#   When set to True, the X and Y axes are reset to their previous
#   positions after Z axis homing. The default is False.

[mcu]
serial: /dev/serial/by-id/usb-1a86_USB_Serial-if00-port0
restart_method: command

[mcu expander]
serial: /dev/serial/by-id/usb-FTDI_FT232R_USB_UART_00000000-if00-port0
restart_method: command

[output_pin expander_LED_red]
pin: expander:PD4
pwm: true
shutdown_value: 0
cycle_time: 0.1

[output_pin expander_LED_blue]
pin: expander:PD6
pwm: true
shutdown_value: 0
cycle_time: 0.1

[output_pin expander_LED_green]
pin: expander:PD5
pwm: true
shutdown_value: 0
cycle_time: 0.1

[output_pin expander_LED_nozzle]
pin: expander:PD7
pwm: true
shutdown_value: 0
cycle_time: 0.1

[output_pin expander_LED_red_state]
pin: virtual_pin:V1
pwm: True
cycle_time: 0.1

[output_pin expander_LED_green_state]
pin: virtual_pin:V2
pwm: True
cycle_time: 0.1

[output_pin expander_LED_blue_state]
pin: virtual_pin:V3
pwm: True
cycle_time: 0.1

[output_pin expander_LED_nozzle_state]
pin: virtual_pin:V4
pwm: True
cycle_time: 0.1

[output_pin expander_x_fan_state]
pin: virtual_pin:V5
pwm: True
cycle_time: 0.1

[output_pin expander_y_fan_state]
pin: virtual_pin:V6
pwm: True
cycle_time: 0.1

[temperature_fan x_fan]
pin: expander: PD2
sensor_type: EPCOS 100K B57560G104F
sensor_pin: expander: PC4
control: watermark
max_delta: 5
min_temp: 0
max_temp: 100
target_temp: 45
max_speed: 1.0
min_speed: 0.0
gcode_id: F

[temperature_fan y_fan]
pin: expander: PD3
sensor_type: EPCOS 100K B57560G104F
sensor_pin: expander: PC5
control: watermark
max_delta: 5
min_temp: -100
max_temp: 100
target_temp: 45
max_speed: 1.0
min_speed: 0.0
gcode_id: G

[stepper_x]
step_pin: PC2
dir_pin: PB9
enable_pin: !PC3
microsteps: 16
rotation_distance: 40
endstop_pin: ^PA5
position_endstop: 0
position_max: 240 
homing_speed: 80

[stepper_y]
step_pin: PB8
dir_pin: PB7
enable_pin: !PC3
microsteps: 16
rotation_distance: 40
endstop_pin: ^PA6
position_endstop: 0
position_max: 225 
homing_speed: 80

[stepper_z]
step_pin: PB6
dir_pin: !PB5
enable_pin: !PC3
microsteps: 16
rotation_distance: 8
endstop_pin: probe:z_virtual_endstop  #enable to use bltouch
# endstop_pin: ^PA7   #disable to use bltouch
# position_endstop: 0.0  #disable to use bltouch
position_max: 245
position_min: -10
homing_speed: 4
second_homing_speed: 1
homing_retract_dist: 2.0

[extruder]
gear_ratio: 1:1
max_extrude_only_distance: 1000.0
step_pin: PB4
dir_pin: PB3
enable_pin: !PC3
microsteps: 16
rotation_distance: 7.366233
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PA1
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC5
#control: pid
# tuned for stock hardware with 200 degree Celsius target
#pid_Kp: 29.291
#pid_Ki: 1.743
#pid_Kd: 123.021
min_temp: 0
max_temp: 300
pressure_advance_smooth_time: 0.04
pressure_advance: 0.028

[idle_timeout]
timeout: 600
gcode:
    LED_white_on
    LED_nozzle_on

[verify_heater extruder]
check_gain_time: 200
hysteresis: 5

[heater_bed]
heater_pin: PA2
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC4
#control: pid
# tuned for stock hardware with 50 degree Celsius target
#pid_Kp: 67.104
#pid_Ki: 0.544
#pid_Kd: 2068.466
min_temp: 0
max_temp: 130

[fan]
pin: PA0

[fan_generic extruder_partfan]
# pin: PB15
pin: PC6
#max_power:
#shutdown_speed:
#cycle_time:
#hardware_pwm:
#kick_start_time:
#off_below:
#tachometer_pin:
#tachometer_ppr:
#tachometer_poll_interval:
#   See the "fan" section for a description of the above parameters.
#heater: extruder
#   Name of the config section defining the heater that this fan is
#   associated with. If a comma separated list of heater names is
#   provided here, then the fan will be enabled when any of the given
#   heaters are enabled. The default is "extruder".
#heater_temp: 50.0
#   A temperature (in Celsius) that the heater must drop below before
#   the fan is disabled. The default is 50 Celsius.
#fan_speed: 1.0
#   The fan speed (expressed as a value from 0.0 to 1.0) that the fan
#   will be set to when its associated heater is enabled. The default
#   is 1.0

[heater_fan heater_partfan]
pin: PB14
#max_power:
#shutdown_speed:
#cycle_time:
#hardware_pwm:
#kick_start_time:
#off_below:
#tachometer_pin:
#tachometer_ppr:
#tachometer_poll_interval:
#   See the "fan" section for a description of the above parameters.
#heater: extruder
#   Name of the config section defining the heater that this fan is
#   associated with. If a comma separated list of heater names is
#   provided here, then the fan will be enabled when any of the given
#   heaters are enabled. The default is "extruder".
#heater_temp: 50.0
#   A temperature (in Celsius) that the heater must drop below before
#   the fan is disabled. The default is 50 Celsius.
#fan_speed: 1.0
#   The fan speed (expressed as a value from 0.0 to 1.0) that the fan
#   will be set to when its associated heater is enabled. The default
#   is 1.0

[printer]
kinematics: cartesian
max_velocity: 500
max_accel: 6000
# max_accel_to_decel: 7000
max_z_velocity: 5
square_corner_velocity: 5.0
max_z_accel: 100

#[adxl345]
#cs_pin: rpi:None
#spi_speed: 2000000
#spi_bus: spidev2.0

#[resonance_tester]
#accel_chip: adxl345
#accel_per_hz: 70
#probe_points:
#      117.5,117.5,10

[input_shaper] 
shaper_type_x: ei 
shaper_freq_x: 38.8 
damping_ratio_y: 0.1
shaper_type_y: 3hump_ei
shaper_freq_y: 76.4
damping_ratio_y: 0.10

[bltouch]
sensor_pin: ^PB1
control_pin: PB0
x_offset: -47.0
y_offset: -5.0
#z_offset: 0.25
speed: 20
samples: 1
sample_retract_dist: 8.0
stow_on_each_sample = false #high speed for bltoch

[bed_mesh]
speed: 120
mesh_min: 30,30         #need to handle head distance with bl_touch
mesh_max: 190,190       #max probe range
probe_count: 5,5
fade_start: 1
fade_end: 10
fade_target: 0
algorithm: bicubic

[bed_screws]
screw1:30,25
screw1_name:1
screw2:200,25
screw2_name:2
screw3:200,195
screw3_name:3
screw4:30,195
screw4_name:4

[exclude_object]

# [delayed_gcode AUTOSTART]
# initial_duration: 1
# gcode:
#   TURN_ON_MOTORS

[gcode_arcs]
#resolution: 1.0

