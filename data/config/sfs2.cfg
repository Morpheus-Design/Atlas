[gcode_macro PRINT_pause]
gcode: 
  LED_state_save
  SET_PIN PIN=expander_LED_red VALUE=0.5
  SET_PIN PIN=expander_LED_green VALUE=0.5
  SET_PIN PIN=expander_LED_blue VALUE=0
  SET_PIN PIN=expander_LED_nozzle VALUE=0.5
  M117 Filament removed, stuck or runout
  LED_yellow_on_no_save
  LED_nozzle_on_no_save 
  PAUSE VELOCITY=150

[filament_switch_sensor switch_sensor]
switch_pin: ^PB15
pause_on_runout: False
runout_gcode:
  M118 switch sensor triggered, pausing the print
  PRINT_pause
insert_gcode:
  M117 Filament inserted
  LED_state_restore

[filament_motion_sensor encoder_sensor]
switch_pin: ^PB12
detection_length: 4.00
extruder: extruder
pause_on_runout: False
runout_gcode:
  M118 encoder sensor triggered, pausing print
  PRINT_pause
insert_gcode:
  M117 Filament inserted
  LED_state_restore