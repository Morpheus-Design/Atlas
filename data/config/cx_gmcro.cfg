[gcode_macro CLEAN]	
gcode:
  G90            ; force absolute positioning
  M83            ; extruder relative (safe default)
  G1 X233.0 Y41.0 Z0.6 F15000 ;Move to cleaning position
  G1 X233.0 Y41.0 Z0.25 F3000 ;Lower to cleaner
  G1 X226.0 Y41.0 Z0.25 F6000 ;Move into cleaner

  G1 Y9.0 F6000 ;Move forward for cleaning
  G1 X233.0 F6000 ;Move to side of cleaner
  G1 X226.0 F6000 ;Move into cleaner

  G1 Y41.0 F8000 ;Move backwards 
  G1 Y9.0 F8000 ;Move forward for cleaning
  G1 Y41.0 F8000 ;Move backwards 
  G1 Y9.0 F8000 ;Move forward for cleaning
  G1 Y41.0 F8000 ;Move backwards 
  G1 Y9.0 F8000 ;Move forward for cleaning
  G1 Y41.0 F8000 ;Move backwards 

  G1 X233.0 F6000 ;Move to side of cleaner
  G1 Z6.0 F3000 ;Move upwards

[gcode_macro START_PRINT]	
gcode:
  RESPOND PREFIX="DEBUG" MSG="HOTEND={params.EXTRUDER_TEMP}, BED={params.BED_TEMP}"
  TIMELAPSE_TAKE_FRAME ENABLE=TRUE
  G90                 ; absolute positioning
  M83                 ; relative extrusion
  G92 E0 ; Reset Extruder
  M140 S{params.BED_TEMP} ;Set bed temperature (no wait)
  M104 S150 ; Set nozzle idle temperature (no wait)
  G28 
  M190 S{params.BED_TEMP} ; Set bed temperature (wait)
  LED_purple_on_no_save #Turn on purple LEDs to indicate homing 
  LED_nozzle_on_no_save #Turn on nozzle LED for printing 
  G4 P200        # allow exclude_object metadata to populate
  BED_MESH_CALIBRATE ; Bedleveling
  LED_state_restore
  #CLEAN ;Clean the nozzle
  M104 S{params.EXTRUDER_TEMP} ; Set nozzle temperature (no wait)
  G1 Z10 F300
  G1 X3 Y20 Z10 F15000.0 ; Move above start position
  G1 Z0.7 F300 ; Move closer to start position
  M109 S{params.EXTRUDER_TEMP} ; Set nozzle temperature (wait)
  G1 X3 Y20 Z0.5 F15000 ; Move to start position
  G1 X3 Y200.0 Z0.5 F1500 E15 ; Draw the first line
  G1 X3.3 Y200.0 Z0.5 F5000 ; Move to side a little
  G1 X3.3 Y20 Z0.5 F1500 E30 ; Draw the second line
  G1 X3.3 Y60 Z0.5 F15000 ; Wipe the nozzle
  G1 X3.3 Y20 Z0.5 F15000 ; Wipe the nozzle
  G1 X3.3 Y60 Z0.5 F15000 ; Wipe the nozzle
  G1 X3.3 Y20 Z0.5 F15000 ; Wipe the nozzle
  G1 X3.3 Y60 Z0.5 F15000 ; Wipe the nozzle
  G92 E0 ; Reset Extruder
  G1 Z2.0 F3000 ; Move Z Axis up little to prevent scratching of Heat Bed
  G1 X5 Y60 Z0.5 F5000.0 ; Move over to prevent blob squish

[gcode_macro END_PRINT]
gcode: 
  LED_green_on
  G91 ;Relative positioning
  G1 E-2 F2700 ;Retract a bit
  G1 E-2 Z0.2 F2400 ;Retract and raise Z
  G1 X5 Y5 F3000 ;Wipe out
  G1 Z10 ;Raise Z more
  G90 ;Absolute positioning
  TIMELAPSE_TAKE_FRAME
  G1 X0 Y{220} ;Present print
  M106 S0 ;Turn-off fan
  M104 S0 ;Turn-off hotend
  M140 S0 ;Turn-off bed
  M84 X Y E ;Disable all steppers but Z
  TIMELAPSE_TAKE_FRAME
  TIMELAPSE_RENDER
  
